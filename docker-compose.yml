version: '3.8'

services:
  app:
    build: .
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://heirloom_user:heirloom_password@postgres:5432/heirloom_db
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: heirloom_postgres
    environment:
      POSTGRES_DB: heirloom_db
      POSTGRES_USER: heirloom_user
      POSTGRES_PASSWORD: heirloom_password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U heirloom_user -d heirloom_db']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
